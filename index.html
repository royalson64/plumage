// ---- Image + blurb fetch with multi-source fallback ----
const cache = {};
function withTimeout(promise, ms){
  return Promise.race([promise, new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")), ms))]);
}
async function srcWikiRest(bird){
  const t = encodeURIComponent(bird.wiki);
  const r = await withTimeout(fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${t}`,{headers:{Accept:"application/json"}}), 7000);
  if(!r.ok) throw 0;
  const d = await r.json();
  return {img: d.originalimage?.source || d.thumbnail?.source || null, blurb: d.extract||""};
}
async function srcWikiAction(bird){
  const t = encodeURIComponent(bird.wiki.replace(/_/g," "));
  const url = `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*`
    + `&prop=pageimages|extracts&piprop=original|thumbnail&pithumbsize=900`
    + `&exintro=1&explaintext=1&redirects=1&titles=${t}`;
  const r = await withTimeout(fetch(url), 7000);
  if(!r.ok) throw 0;
  const d = await r.json();
  const page = Object.values(d.query?.pages || {})[0] || {};
  return {img: page.original?.source || page.thumbnail?.source || null, blurb: page.extract||""};
}
async function srcINat(bird){
  const url = `https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(bird.sci)}&rank=species&per_page=1`;
  const r = await withTimeout(fetch(url), 7000);
  if(!r.ok) throw 0;
  const d = await r.json();
  const res = (d.results||[])[0];
  let img = res?.default_photo?.medium_url || res?.default_photo?.url || null;
  if(img) img = img.replace("/square.","/medium.").replace("/small.","/medium.");
  return {img, blurb: res?.wikipedia_summary ? res.wikipedia_summary.replace(/<[^>]+>/g,"") : ""};
}
async function fetchBird(bird){
  if(cache[bird.wiki]) return cache[bird.wiki];
  let blurb = "";
  for(const src of [srcWikiRest, srcWikiAction, srcINat]){
    try{
      const out = await src(bird);
      if(out.blurb && !blurb) blurb = out.blurb;
      if(out.img){ const res={img:out.img, blurb:blurb||out.blurb||""}; cache[bird.wiki]=res; return res; }
    }catch(e){}
  }
  const res={img:null, blurb}; cache[bird.wiki]=res; return res;
}

// ---- Decoy picker (plausible lookalikes; fixed difficulty, no escalation) ----
function genusOf(sci){return sci.split(" ")[0];}
function nameTokens(name){return new Set(name.toLowerCase().replace(/[^a-z\s-]/g,"").split(/[\s-]+/).filter(Boolean));}
function confusion(t,o){
  if(t.name===o.name) return -1;
  let s=0;
  if(t.family===o.family) s+=5;
  if(genusOf(t.sci)===genusOf(o.sci)) s+=4;
  const a=nameTokens(t.name), b=nameTokens(o.name); let sh=0;
  a.forEach(x=>{if(b.has(x)&&x.length>2) sh++;});
  return s + sh*2;
}
function pickDecoys(target, pool, count){
  const scored = pool.filter(b=>b.name!==target.name)
    .map(b=>({b,c:confusion(target,b)})).sort((x,y)=>y.c-x.c);
  const window = scored.slice(0, Math.max(count+1, Math.min(scored.length, count+5)));
  const chosen=[]; const used=new Set();
  while(chosen.length<count && used.size<window.length){
    const liveIdx=[]; window.forEach((_,i)=>{if(!used.has(i))liveIdx.push(i);});
    const weights = liveIdx.map(i=>Math.max(window[i].c,0.4)+0.6);
    const total = weights.reduce((a,w)=>a+w,0);
    let r=Math.random()*total, k=0;
    for(; k<weights.length; k++){ r-=weights[k]; if(r<=0) break; }
    const realIdx = liveIdx[Math.min(k, liveIdx.length-1)];
    used.add(realIdx); chosen.push(window[realIdx].b);
  }
  return chosen;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ---- FOCUS TIERS: tap to set sharpness. Blurrier = more points. ----
// Index 0 = fully blurred (100 pts) ... last = fully sharp (25 pts).
const TIERS = [
  {pts:100, label:"Blurred", blur:20},
  {pts:75,  label:"Hazy",    blur:11},
  {pts:50,  label:"Soft",    blur:5},
  {pts:25,  label:"Sharp",   blur:0},
];

// ---- tiny DOM helper ----
function h(tag, attrs, ...kids){
  const e=document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==="style") Object.assign(e.style, attrs[k]);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if(k==="html") e.innerHTML = attrs[k];
    else if(attrs[k]!=null && attrs[k]!==false) e.setAttribute(k, attrs[k]);
  }
  kids.flat().forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c); });
  return e;
}
const CS = getComputedStyle(document.documentElement);
const col = n => CS.getPropertyValue(n).trim();

// ---- game state ----
const S = {
  screen:"home", selFams:[], choices:4, rounds:10,
  round:0, score:0, streak:0, best:0,
  target:null, options:[], picked:null, revealed:false,
  img:null, blurb:"", loading:false, imgError:false,
  focus:0, lastGain:0, lastTier:null, history:[], used:new Set(),
};
const app = document.getElementById("app");

function pool(){ return S.selFams.length? BIRD_DATA.filter(b=>S.selFams.includes(b.family)) : BIRD_DATA; }
function effChoices(){ return Math.min(S.choices, BIRD_DATA.length); }
// Decoys come from the chosen pool when it's big enough to fill the round;
// otherwise we borrow from the full dataset so a tiny family still gives a
// real multiple-choice question. Target always comes from the chosen pool.
function decoyPool(){
  const p = pool();
  return p.length >= S.choices ? p : BIRD_DATA;
}

async function loadRound(n){
  S.picked=null; S.revealed=false; S.img=null; S.blurb=""; S.imgError=false;
  S.loading=true; S.focus=0; S.lastTier=null;
  let cands = pool().filter(b=>!S.used.has(b.name));
  if(cands.length<1){ S.used=new Set(); cands=pool(); }
  const tgt = cands[Math.floor(Math.random()*cands.length)];
  S.used.add(tgt.name);
  S.target=tgt;
  S.options=shuffle([tgt, ...pickDecoys(tgt, decoyPool(), effChoices()-1)]);
  S.round=n; render();
  try{
    const d = await fetchBird(tgt);
    if(!d.img) S.imgError=true;
    S.img=d.img; S.blurb=d.blurb;
  }catch(e){ S.imgError=true; }
  S.loading=false; render();
}

function startGame(){
  S.used=new Set(); S.score=0; S.streak=0; S.best=0; S.history=[];
  S.screen="play"; loadRound(1);
}
function choose(name){
  if(S.revealed||!S.target) return;
  S.picked=name; S.revealed=true;
  const correct = name===S.target.name;
  const tier = TIERS[S.focus];
  const gained = correct ? tier.pts : 0;
  S.lastGain=gained; S.lastTier=tier; S.score+=gained;
  S.history.push({bird:S.target, correct, picked:name, pts:gained, tier:tier.label});
  if(correct){ S.streak++; S.best=Math.max(S.best,S.streak); } else S.streak=0;
  render();
}
function next(){ if(S.round>=S.rounds){ S.screen="over"; render(); } else loadRound(S.round+1); }

// set focus level by tapping a button (idx into TIERS)
function setFocus(idx){
  S.focus = idx;
  const im=document.getElementById("birdimg");
  if(im && !S.imgError){ im.style.filter = `blur(${TIERS[idx].blur}px)`; }
  // restyle the focus buttons to show which is active
  document.querySelectorAll("[data-focusbtn]").forEach(el=>{
    const i = +el.getAttribute("data-focusbtn");
    const on = i===idx;
    el.style.background = on ? col("--gold") : "transparent";
    el.style.color = on ? "#16201c" : col("--parch2");
    el.style.borderColor = on ? col("--gold") : "rgba(243,236,221,0.25)";
  });
}

  app.innerHTML="";
  if(S.screen==="home") app.appendChild(Home());

function Home(){
  const allOn = S.selFams.length===0;
  const famChips = h("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}},
    chip("All families", allOn, ()=>{S.selFams=[];render();}, col("--gold")),
    ...FAMILIES.map(f=>{

      const n=BIRD_DATA.filter(b=>b.family===f).length;
      return chip(h("span",{},f," ",h("span",{class:"mono",style:{opacity:0.55,fontSize:"11px"}},"·"+n)), on, ()=>{
        S.selFams = on ? S.selFams.filter(x=>x!==f) : [...S.selFams,f]; render();
      });
    })
  );
  return h("div",{},
    Header(false),
    h("p",{style:{color:col("--parch2"),lineHeight:1.5,marginTop:"-4px",fontSize:"15px"}},
      "Identify the bird from its photo. Pick a field — or take on every family at once. Each photo starts blurred; roll the focus wheel to sharpen it, but the clearer you make it before guessing, the fewer points it's worth."),
    sectionLabel("Choose your fields"), famChips,
    h("div",{class:"mono",style:{marginTop:"8px",fontSize:"12.5px",color:col("--faint")}}, pool().length+" birds in play"+(allOn?" across all families":"")),
    sectionLabel("Choices per round"),
    h("div",{style:{display:"flex",gap:"8px"}}, ...[2,3,4,6].map(n=>chip(String(n), S.choices===n, ()=>{S.choices=n;render();}, col("--accent2")))),
    sectionLabel("Rounds"),
    h("div",{style:{display:"flex",gap:"8px"}}, ...[5,10,15,20].map(n=>chip(String(n), S.rounds===n, ()=>{S.rounds=n;render();}, col("--accent2")))),
    primaryBtn("Start spotting →", startGame),
    h("p",{style:{color:col("--faint"),fontSize:"12px",marginTop:"18px",lineHeight:1.5}},
      "Photos and notes load live from Wikipedia and iNaturalist. Needs an internet connection.")
  );
}

function TopBar(){
  return h("div",{style:{paddingTop:"18px",paddingBottom:"12px"}},
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("button",{onClick:()=>{S.screen="home";render();},style:{background:"transparent",border:"none",color:col("--parch2"),cursor:"pointer",fontFamily:"'IBM Plex Mono',monospace",fontSize:"12px"}},"‹ quit"),
      h("div",{class:"mono",style:{fontSize:"12px",color:col("--parch2")}},`ROUND ${S.round}/${S.rounds}`),
      h("div",{class:"mono",style:{fontSize:"12px",color:col("--gold")}},`${S.score} pts`)
    ),
    h("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginTop:"10px"}},
      h("span",{class:"mono",style:{fontSize:"12px",color:col("--parch2")}}, ("🔥".repeat(Math.min(S.streak,5))||"—")+" "+(S.streak>0?"x"+S.streak:"no streak"))
    )
  );
}

function FocusButtons(){
  return h("div",{style:{marginTop:"14px"}},
    h("div",{class:"mono",style:{fontSize:"11px",letterSpacing:"1.5px",color:col("--gold"),textTransform:"uppercase",marginBottom:"7px"}},
      "Focus — tap to sharpen · blurrier scores more"),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:"8px"}},
      ...TIERS.map((t,i)=>{
        const on = i===S.focus;
        return h("button",{"data-focusbtn":String(i),onClick:()=>setFocus(i),style:{
          padding:"11px 6px",borderRadius:"12px",cursor:"pointer",textAlign:"center",
          border:`1.5px solid ${on?col("--gold"):"rgba(243,236,221,0.25)"}`,
          background:on?col("--gold"):"transparent",color:on?"#16201c":col("--parch2"),
          transition:"all .12s ease"}},
          h("div",{style:{fontFamily:"Fraunces,serif",fontWeight:700,fontSize:"15px",lineHeight:1}}, String(t.pts)),
          h("div",{class:"mono",style:{fontSize:"10px",marginTop:"4px",opacity:0.85}}, t.label)
        );
      })
    )
  );
}

function Play(){
  const t = TIERS[S.focus];
  const blurPx = S.imgError ? 0 : t.blur;
  const stage = h("div",{style:{position:"relative",width:"100%",aspectRatio:"4 / 3",borderRadius:"18px",overflow:"hidden",
    background:col("--ink2"),border:"1px solid rgba(243,236,221,0.12)",boxShadow:"0 18px 50px rgba(0,0,0,0.45)"}});
  if(S.loading){
    stage.appendChild(h("div",{style:{position:"absolute",inset:0,background:"linear-gradient(100deg,#1f2b26 30%,#2a3833 50%,#1f2b26 70%)",backgroundSize:"200% 100%",animation:"shimmer 1.2s infinite linear"}}));
  } else if(S.img && !S.imgError){
    stage.appendChild(h("img",{id:"birdimg",src:S.img,alt:"mystery bird",
      onerror:()=>{S.imgError=true;render();},
      style:{width:"100%",height:"100%",objectFit:"cover",filter:`blur(${blurPx}px)`,transition:"filter .12s linear"}}));
  } else {
    stage.appendChild(h("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"24px",color:col("--parch2")}},
      h("div",{style:{fontSize:"30px"}},"🐦"),
      h("div",{style:{marginTop:"8px",fontSize:"14px"}},"Photo wouldn't load — go by the name match this round.")));
  }

  const opts = h("div",{style:{display:"grid",gridTemplateColumns:"1fr",gap:"10px",marginTop:"14px"}},
    ...S.options.map(o=>{
      const isT = S.target && o.name===S.target.name;
      const isP = S.picked===o.name;
      let bg=col("--parch"), bd=col("--line");
      if(S.revealed){ if(isT){bg="#dff1e4";bd=col("--good");} else if(isP){bg="#f7dcd8";bd=col("--bad");} else {bg="#efe7d4";} }
      return h("button",{onClick:()=>choose(o.name),disabled:S.revealed?"":null,style:{
        textAlign:"left",padding:"13px 15px",borderRadius:"13px",border:`1.5px solid ${bd}`,background:bg,color:col("--text"),
        cursor:S.revealed?"default":"pointer",width:"100%",transition:"box-shadow .15s ease",
        boxShadow:(S.revealed&&isT)?"0 0 0 3px rgba(47,143,91,0.18)":"none"}},
        h("div",{class:"fraunces",style:{fontWeight:600,fontSize:"17px",lineHeight:"1.15"}},o.name),
        h("div",{class:"mono",style:{fontSize:"11.5px",color:col("--faint"),marginTop:"3px"}}, o.sci+" · "+o.famSci)
      );
    })
  );

  const node = h("div",{}, TopBar(), stage);

  if(!S.revealed && !S.loading && !S.imgError) node.appendChild(FocusButtons());

  if(!S.revealed){
    node.appendChild(h("p",{style:{textAlign:"center",color:col("--parch2"),fontSize:"13px",margin:"12px 0 2px"}},
      "Which bird is this?"));
  }
  node.appendChild(opts);

  if(S.revealed && S.target){
    const correct = S.picked===S.target.name;
    const tierNote = correct ? `${S.lastTier.label} focus · +${S.lastGain}` : "no points";
    const reveal = h("div",{style:{marginTop:"16px",background:col("--parch"),color:col("--text"),borderRadius:"16px",padding:"16px",border:`1px solid ${col("--line")}`}},
      h("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:"10px"}},
        h("div",{class:"fraunces",style:{fontWeight:800,fontSize:"20px"}}, correct?"Spotted it.":"Not quite."),
        h("div",{class:"mono",style:{fontSize:"12px",fontWeight:500,color:correct?col("--good"):col("--bad")}}, tierNote)),
      h("div",{class:"mono",style:{fontSize:"12px",color:col("--faint"),marginTop:"4px"}}, `${S.target.name} · ${S.target.sci} · ${S.target.family}`),
      S.blurb && h("p",{style:{fontSize:"13.5px",lineHeight:1.5,marginTop:"10px",marginBottom:0}}, S.blurb.length>260?S.blurb.slice(0,257)+"…":S.blurb),
      h("a",{href:`https://en.wikipedia.org/wiki/${S.target.wiki}`,target:"_blank",rel:"noreferrer",
        style:{display:"inline-block",marginTop:"10px",fontSize:"12.5px",color:col("--accent2"),fontWeight:600,textDecoration:"none"}},"Read more on Wikipedia ↗"),
      primaryBtn(S.round>=S.rounds?"See results →":"Next bird →", next, 14)
    );
    node.appendChild(reveal);
  }
  return node;
}

function stat(label,value,accent){
  return h("div",{},
    h("div",{class:"fraunces",style:{fontWeight:800,fontSize:"26px",color:accent}}, String(value)),
    h("div",{class:"mono",style:{fontSize:"10.5px",letterSpacing:"1px",color:col("--faint"),textTransform:"uppercase"}}, label));
}
function Over(){
  const correctCount = S.history.filter(x=>x.correct).length;
  const pct = S.history.length?Math.round(correctCount/S.history.length*100):0;
  const rows = h("div",{style:{marginTop:"18px",borderTop:`1px solid ${col("--line")}`,paddingTop:"12px"}},
    ...S.history.map((x,i)=>h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"7px 0",
      borderBottom:i<S.history.length-1?`1px solid ${col("--parch2")}`:"none"}},
      h("span",{style:{fontSize:"15px"}}, x.correct?"✅":"❌"),
      h("div",{style:{flex:1}},
        h("div",{class:"fraunces",style:{fontWeight:600,fontSize:"15px",color:col("--text")}}, x.bird.name),
        h("div",{class:"mono",style:{fontSize:"12px",color: x.correct?col("--faint"):col("--bad")}},
          x.correct ? `${x.tier} focus · +${x.pts}` : "you said: "+x.picked)),
      h("span",{class:"mono",style:{fontSize:"11px",color:col("--faint")}}, x.bird.famSci)))
  );
  return h("div",{},
    Header(true),
    h("div",{style:{background:col("--parch"),color:col("--text"),borderRadius:"18px",padding:"20px",border:`1px solid ${col("--line")}`,marginTop:"8px"}},
      h("div",{class:"fraunces",style:{fontWeight:800,fontSize:"26px"}},"Field log"),
      h("div",{style:{display:"flex",gap:"18px",marginTop:"12px",flexWrap:"wrap"}},
        stat("Score",S.score,col("--accent")),
        stat("Correct",`${correctCount}/${S.history.length}`,col("--good")),
        stat("Accuracy",pct+"%",col("--accent2")),
        stat("Best streak",S.best,col("--gold"))),
      rows
    ),
    primaryBtn("New round →", ()=>{S.screen="home";render();}, 16),
    ghostBtn("Replay same settings", startGame)
  );
}

render();
</script>
</body>
</html>
